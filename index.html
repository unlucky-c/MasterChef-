<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crunchies | App by Abhijit</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Sigmar+One&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === PREMIUM CSS VARIABLES === */
        :root {
            --red-main: #E4002B;
            --bg-light: #F4F6F9;
            --card-bg: #FFFFFF;
            --text-dark: #121212;
            --text-gray: #8892B0;
            --yellow-accent: #FFB800;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-light); color: var(--text-dark); overflow-x: hidden; padding-bottom: 100px; transition: transform 0.1s; }
        
        /* Screen Shake Effect for the Epic Burp */
        .shake-screen { animation: earthquake 0.5s ease-in-out; }
        @keyframes earthquake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }

        /* === MODERN HEADER === */
        header { 
            position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; background: rgba(244, 246, 249, 0.85); backdrop-filter: blur(20px); 
            z-index: 1000; transition: 0.4s;
        }
        .header-scrolled { box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: rgba(255, 255, 255, 0.95); }
        .logo-box { display: flex; flex-direction: column; line-height: 0.9; }
        .logo { font-family: 'Sigmar One', cursive; color: var(--red-main); font-size: 1.6rem; text-shadow: 2px 2px 0px rgba(228, 0, 43, 0.1); }
        .creator-tag { font-size: 0.6rem; color: var(--text-gray); font-weight: 900; text-transform: uppercase; letter-spacing: 3px; }
        
        .cart-icon { position: relative; font-size: 1.6rem; color: var(--text-dark); cursor: pointer; padding: 5px; }
        .cart-badge { 
            position: absolute; top: -2px; right: -5px; background: var(--red-main); color: white; 
            font-size: 0.65rem; font-weight: 900; height: 20px; width: 20px; display: flex; 
            justify-content: center; align-items: center; border-radius: 50%; border: 3px solid var(--bg-light); 
            transform: scale(0); transition: 0.4s var(--spring); 
        }
        .cart-badge.has-items { transform: scale(1); }

        /* === CINEMATIC HERO === */
        .hero { margin: 90px 20px 20px; border-radius: 32px; overflow: hidden; position: relative; box-shadow: 0 20px 40px rgba(228, 0, 43, 0.15); }
        .hero-bg { width: 100%; height: 220px; object-fit: cover; filter: brightness(0.6); }
        .hero-content { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
        .hero-badge { display: inline-block; background: var(--yellow-accent); color: #000; padding: 6px 14px; border-radius: 20px; font-weight: 900; font-size: 0.75rem; margin-bottom: 8px; }
        .hero-title { color: white; font-size: 2rem; font-family: 'Sigmar One', cursive; line-height: 1.1; }

        /* === RUNAWAY DIET BUTTON (EASTER EGG) === */
        .diet-btn {
            position: fixed; bottom: 20px; right: 20px; background: #4CAF50; color: white; font-weight: 900; 
            padding: 12px 20px; border-radius: 30px; box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4); 
            z-index: 500; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* === CATEGORIES === */
        .categories { display: flex; overflow-x: auto; padding: 10px 20px 20px; gap: 12px; scroll-snap-type: x mandatory; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: var(--card-bg); padding: 14px 28px; border-radius: 100px; border: none;
            font-weight: 700; color: var(--text-gray); display: flex; align-items: center; gap: 10px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.03); scroll-snap-align: start; white-space: nowrap; transition: 0.4s;
        }
        .cat-btn.active { background: var(--red-main); color: white; box-shadow: 0 12px 25px rgba(228,0,43,0.3); transform: translateY(-3px); }

        /* === PROTRUDING MENU CARDS === */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px 15px; padding: 30px 20px 20px; }
        .food-card { 
            background: var(--card-bg); border-radius: 28px; padding: 55px 15px 15px; text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.04); position: relative; 
            opacity: 0; transform: translateY(40px); transition: 0.6s var(--spring); 
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .food-card.show { opacity: 1; transform: translateY(0); }
        .food-img-wrapper { 
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 110px; height: 110px; 
            border-radius: 50%; background: white; box-shadow: 0 15px 25px rgba(0,0,0,0.1); padding: 5px; z-index: 2;
        }
        .food-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; animation: float 4s ease-in-out infinite; }
        .food-name { font-size: 0.95rem; font-weight: 800; color: var(--text-dark); margin-bottom: 5px; line-height: 1.2; flex-grow: 1;}
        .food-price { font-size: 1.3rem; color: var(--red-main); font-weight: 900; margin-bottom: 15px; }
        .add-btn { 
            background: var(--bg-light); color: var(--text-dark); border: none; width: 100%; 
            padding: 12px; border-radius: 16px; font-weight: 900; font-size: 0.9rem; transition: 0.3s;
        }
        .add-btn:active { transform: scale(0.92); }
        .add-btn.added { background: var(--red-main); color: white; }

        /* === SLIDING CART === */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; opacity: 0; visibility: hidden; transition: 0.4s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        .cart-sheet { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh; background: var(--card-bg); z-index: 2001; 
            border-radius: 40px 40px 0 0; padding: 25px; display: flex; flex-direction: column; transition: bottom 0.5s var(--spring); 
        }
        .cart-sheet.active { bottom: 0; }
        .cart-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        .cart-item { display: flex; align-items: center; gap: 15px; background: var(--bg-light); padding: 12px; border-radius: 20px; }
        .cart-item img { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; }
        .checkout-btn { width: 100%; background: var(--red-main); color: white; border: none; padding: 18px; border-radius: 20px; font-size: 1.2rem; font-weight: 900; margin-top: 15px; box-shadow: 0 10px 25px rgba(228,0,43,0.3); transition: 0.3s; }
        .checkout-btn:active { transform: scale(0.96); }

        /* === FUNNY SERVE SCREEN === */
        .serve-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, rgba(20,20,20,0.98), rgba(0,0,0,0.99)); 
            z-index: 6000; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            opacity: 0; visibility: hidden; transition: 0.5s; 
        }
        .serve-screen.active { opacity: 1; visibility: visible; }
        .serve-text { font-family: 'Sigmar One', cursive; font-size: 2rem; color: white; text-align: center; line-height: 1.2; margin-bottom: 40px; }
        
        /* 3D Cloche Setup */
        .stage { position: relative; width: 250px; height: 200px; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 40px; }
        .food-reveal { position: absolute; bottom: 30px; z-index: 2; transform: scale(0); transition: 0.8s var(--spring); }
        .food-reveal img { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 5px solid white; box-shadow: 0 20px 40px rgba(0,0,0,0.8); background: white; }
        .food-reveal.show { transform: scale(1) translateY(-20px); animation: float 3s ease-in-out infinite alternate; }
        
        .dome-wrap { position: absolute; bottom: 10px; z-index: 5; transition: transform 1.2s cubic-bezier(0.5, 0, 0, 1), opacity 1s ease 0.2s; }
        .dome-wrap.lift { transform: translateY(-500px) rotate(25deg); opacity: 0; }
        .dome { width: 200px; height: 130px; background: linear-gradient(135deg, #fdfdfd, #909090); border-radius: 120px 120px 0 0; position: relative; border: 1px solid rgba(255,255,255,0.5); }
        .dome-handle { width: 45px; height: 22px; background: linear-gradient(to right, #ccc, #999); border-radius: 25px 25px 0 0; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); }
        .plate { width: 240px; height: 25px; background: linear-gradient(to bottom, #e0e0e0, #888); border-radius: 50%; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); z-index: 0; }

        .eat-btn { background: var(--yellow-accent); color: black; border: none; padding: 18px 40px; font-size: 1.3rem; font-weight: 900; border-radius: 100px; opacity: 0; transform: translateY(30px); transition: 0.6s var(--spring); box-shadow: 0 15px 30px rgba(255, 184, 0, 0.4); }
        .eat-btn.show { opacity: 1; transform: translateY(0); }

        /* COMIC BOOK CHOMP EFFECT */
        .comic-chomp {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0) rotate(-20deg);
            font-family: 'Sigmar One', cursive; font-size: 5rem; color: #FFB800; text-shadow: 5px 5px 0px #E4002B, -2px -2px 0px #FFF;
            z-index: 9000; opacity: 0; pointer-events: none;
        }
        .comic-chomp.show { animation: bamEffect 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* ANIMATIONS */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes bamEffect { 0% { transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity:1; } 50% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); opacity:1; } 100% { transform: translate(-50%, -50%) scale(2) rotate(20deg); opacity:0; } }
        @keyframes bite { 0% { transform: scale(1); } 30% { transform: scale(1.2); filter: brightness(1.5); } 100% { transform: scale(0) rotate(720deg); opacity: 0; } }
        .chomping { animation: bite 0.6s ease-in forwards; }
        
        /* The Running Chicken */
        .running-chicken { position: fixed; top: 40%; left: -150px; font-size: 100px; z-index: 9999; pointer-events: none; }
        .running-chicken.run { animation: runAcross 2s linear forwards; }
        @keyframes runAcross { 0% { left: -150px; transform: scaleX(1) rotate(-10deg) translateY(0); } 25% { transform: scaleX(1) rotate(10deg) translateY(-20px); } 50% { transform: scaleX(1) rotate(-10deg) translateY(0); } 75% { transform: scaleX(1) rotate(10deg) translateY(-20px); } 100% { left: 120vw; transform: scaleX(1) rotate(0) translateY(0); } }

        /* Confetti */
        .particle { position: fixed; width: 15px; height: 15px; border-radius: 50%; pointer-events: none; z-index: 8000; opacity: 0; }
        @keyframes explode { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <!-- Header -->
    <header id="header">
        <div class="logo-box">
            <div class="logo">CRUNCHIES</div>
            <div class="creator-tag">By Abhijit</div>
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fa-solid fa-basket-shopping"></i>
            <div class="cart-badge" id="cart-badge">0</div>
        </div>
    </header>

    <!-- Runaway Diet Button (Easter Egg) -->
    <div class="diet-btn" id="diet-btn" onmouseover="runAway()" ontouchstart="runAway()">
        🥗 Start Diet
    </div>

    <!-- Hero -->
    <section class="hero" id="hero-sec">
        <img src="https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=800&q=80" class="hero-bg">
        <div class="hero-content">
            <div class="hero-badge">Warning: Highly Addictive</div>
            <h1 class="hero-title">Abhijit's<br>Mega Menu</h1>
        </div>
    </section>

    <!-- Categories -->
    <section class="categories">
        <button class="cat-btn active" onclick="filterMenu('All', this)">🔥 All</button>
        <button class="cat-btn" onclick="filterMenu('Chicken', this)">🍗 Chicken</button>
        <button class="cat-btn" onclick="filterMenu('Burger', this)">🍔 Burgers</button>
        <button class="cat-btn" onclick="filterMenu('Drinks', this)">🥤 Drinks</button>
    </section>

    <!-- Menu Grid -->
    <section class="menu-grid" id="menu-grid"></section>

    <!-- Cart Overlay -->
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-sheet" id="cart-sheet">
        <div style="width: 50px; height: 5px; background: #E0E0E0; border-radius: 10px; margin: 0 auto 20px;"></div>
        <div style="font-size: 1.5rem; font-weight: 900; display: flex; justify-content: space-between; margin-bottom: 20px;">
            <span>Your Stash</span>
            <span id="cart-count-title" style="color: var(--text-gray); font-size: 1rem; align-self: flex-end;">0 Items</span>
        </div>
        <div class="cart-list" id="cart-items"></div>
        <div style="background: white; padding-top: 15px; border-top: 1px solid #eee;">
            <div style="display: flex; justify-content: space-between; font-weight: 900; font-size: 1.4rem; margin-bottom: 10px;">
                <span>Total</span><span id="cart-total" style="color: var(--red-main);">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="triggerCheckoutChaos()">Checkout & Feast</button>
        </div>
    </div>

    <!-- Funny Serve Screen -->
    <div class="serve-screen" id="serve-screen">
        <h2 class="serve-text" id="serve-title">Waking up<br>Chef Abhijit... 😴</h2>
        
        <div class="stage">
            <div class="plate"></div>
            <div class="food-reveal" id="food-reveal"></div>
            <div class="dome-wrap" id="dome">
                <div class="dome-handle"></div>
                <div class="dome"></div>
            </div>
        </div>

        <button class="eat-btn" id="eat-btn" onclick="epicChomp()">ANNIHILATE FOOD 🍴</button>
    </div>

    <!-- Comic Effect -->
    <div class="comic-chomp" id="comic-chomp">CHOMP!</div>

    <!-- Running Chicken -->
    <div class="running-chicken" id="running-chicken">🐔💨</div>

    <!-- JavaScript -->
    <script>
        // EXPANDED MENU DATABASE WITH 100% WORKING IMAGES
        const menuData = [
            // --- CHICKEN ---
            { id: 1, name: "Bucket of Joy", category: "Chicken", price: 14.99, img: "https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?auto=format&fit=crop&w=500&q=80" },
            { id: 2, name: "Spicy Hot Wings", category: "Chicken", price: 7.99, img: "https://images.unsplash.com/photo-1625938146369-adc83368bda7?auto=format&fit=crop&w=500&q=80" },
            { id: 3, name: "Golden Tenders", category: "Chicken", price: 8.99, img: "https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&w=500&q=80" },
            { id: 4, name: "Popcorn Chicken", category: "Chicken", price: 5.49, img: "https://images.unsplash.com/photo-1603415526960-f7e0328c63b1?auto=format&fit=crop&w=500&q=80" },
            { id: 5, name: "Grilled Wrap", category: "Chicken", price: 6.99, img: "https://images.unsplash.com/photo-1626700051175-6818013e1d4f?auto=format&fit=crop&w=500&q=80" },
            
            // --- BURGERS & SIDES ---
            { id: 6, name: "Heart Attack Burger", category: "Burger", price: 9.49, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=500&q=80" },
            { id: 7, name: "Double Zinger", category: "Burger", price: 10.99, img: "https://images.unsplash.com/photo-1586190848861-99aa4a171e90?auto=format&fit=crop&w=500&q=80" },
            { id: 8, name: "Cheesy Lava Burger", category: "Burger", price: 8.49, img: "https://images.unsplash.com/photo-1553979459-d2229ba7433b?auto=format&fit=crop&w=500&q=80" },
            { id: 9, name: "Salty Fries", category: "Burger", price: 3.99, img: "https://images.unsplash.com/photo-1576107232684-1279f390859f?auto=format&fit=crop&w=500&q=80" },
            { id: 10, name: "Crispy Onion Rings", category: "Burger", price: 4.49, img: "https://images.unsplash.com/photo-1639024471210-85f0855ea055?auto=format&fit=crop&w=500&q=80" },
            
            // --- DRINKS ---
            { id: 11, name: "Brain Freeze Cola", category: "Drinks", price: 2.49, img: "https://images.unsplash.com/photo-1624517452488-04869289c4ca?auto=format&fit=crop&w=500&q=80" },
            { id: 12, name: "Sugar Rush Shake", category: "Drinks", price: 5.99, img: "https://images.unsplash.com/photo-1579954115545-a95591f28bfc?auto=format&fit=crop&w=500&q=80" },
            { id: 13, name: "Minty Mojito", category: "Drinks", price: 4.99, img: "https://images.unsplash.com/photo-1551538827-9c037cb4f32a?auto=format&fit=crop&w=500&q=80" },
            { id: 14, name: "Iced Caramel Latte", category: "Drinks", price: 5.49, img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=500&q=80" },
            { id: 15, name: "Fresh Lemonade", category: "Drinks", price: 3.49, img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&w=500&q=80" }
        ];

        let cart = [];
        let mostExpensiveImg = "";

        // Header Blur logic
        window.addEventListener('scroll', () => {
            const header = document.getElementById('header');
            if (window.scrollY > 20) header.classList.add('header-scrolled');
            else header.classList.remove('header-scrolled');
        });

        // The Runaway Diet Button (Easter Egg)
        function runAway() {
            const btn = document.getElementById('diet-btn');
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            btn.style.left = `${Math.max(10, x)}px`; // Prevent it going off-screen left
            btn.style.top = `${Math.max(100, y)}px`; // Prevent going under header
            btn.style.bottom = 'auto';
            btn.style.right = 'auto';
            
            const funnyTexts = ["Too slow!", "Nope! 🍔", "Eat Chicken!", "Nice try! 😂", "Never!"];
            btn.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
        }

        // Render Menu
        function renderMenu(filter = "All") {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = ""; 
            const items = filter === "All" ? menuData : menuData.filter(i => i.category === filter);

            items.forEach((item, index) => {
                grid.innerHTML += `
                    <div class="food-card" style="transition-delay: ${index * 0.05}s">
                        <div class="food-img-wrapper"><img src='${item.img}' class="food-img"></div>
                        <h3 class="food-name">${item.name}</h3>
                        <p class="food-price">$${item.price.toFixed(2)}</p>
                        <button class="add-btn" onclick="addToCart(${item.id}, this)">+ Grab It</button>
                    </div>`;
            });

            setTimeout(() => { document.querySelectorAll('.food-card').forEach(card => card.classList.add('show')); }, 50);
        }

        function filterMenu(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenu(category);
        }

        function addToCart(id, btn) {
            cart.push(menuData.find(i => i.id === id));
            btn.innerHTML = "Got it! 😎";
            btn.classList.add('added');
            setTimeout(() => { btn.innerHTML = "+ Grab It"; btn.classList.remove('added'); }, 1000);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const badge = document.getElementById('cart-badge');
            
            if(cart.length > 0) badge.classList.add('has-items'); else badge.classList.remove('has-items');
            badge.innerText = cart.length;
            document.getElementById('cart-count-title').innerText = `${cart.length} Items`;

            list.innerHTML = ""; let total = 0; let maxP = 0;
            
            if (cart.length === 0) {
                list.innerHTML = `
                    <div style="text-align:center; padding: 40px 20px; color: var(--text-gray);">
                        <i class="fa-solid fa-spider" style="font-size: 3rem; opacity: 0.3; margin-bottom:15px;"></i>
                        <p>A spider built a web in here.<br>Add some food!</p>
                    </div>`;
            }

            cart.forEach((item, idx) => {
                total += item.price;
                if(item.price > maxP) { maxP = item.price; mostExpensiveImg = item.img; }
                list.innerHTML += `
                    <div class="cart-item">
                        <img src='${item.img}'>
                        <div style="flex-grow:1;">
                            <h4 style="font-size: 0.95rem; font-weight:800;">${item.name}</h4>
                            <p style="color:var(--red-main); font-weight:900;">$${item.price.toFixed(2)}</p>
                        </div>
                        <button onclick="removeFromCart(${idx})" style="background:none; border:none; font-size:1.4rem; color:#ff4d4d; cursor:pointer;"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function removeFromCart(idx) { cart.splice(idx, 1); updateCartUI(); }
        function toggleCart() { document.getElementById('cart-sheet').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

        // == THE CHAOTIC CHECKOUT ==
        function triggerCheckoutChaos() {
            if (cart.length === 0) return alert("You can't eat air! Add something first.");
            toggleCart();

            // 1. Trigger the Running Chicken
            const chicken = document.getElementById('running-chicken');
            chicken.classList.add('run');
            
            // 2. Open screen
            const serveScreen = document.getElementById('serve-screen');
            serveScreen.classList.add('active');
            
            // Set image to the most expensive item bought
            document.getElementById('food-reveal').innerHTML = `<img src='${mostExpensiveImg}'>`;

            // 3. Funny text sequence
            setTimeout(() => { document.getElementById('serve-title').innerHTML = "Chef Abhijit caught<br>the chicken! 🍗"; }, 1000);
            setTimeout(() => { document.getElementById('serve-title').innerHTML = "Sprinkling top-secret<br>magic dust... ✨"; }, 2500);

            // 4. Reveal
            setTimeout(() => {
                chicken.classList.remove('run'); // reset chicken
                document.getElementById('serve-title').innerHTML = "BAM! Order Up! 🛎️<br><span style='font-size:1.2rem; color: #FFB800;'>Prepare your stomach.</span>";
                document.getElementById('dome').classList.add('lift');
                document.getElementById('food-reveal').classList.add('show');
                document.getElementById('eat-btn').classList.add('show');
                shootConfetti(); 
            }, 4000);
        }

        function shootConfetti() {
            const colors = ['#E4002B', '#FFB800', '#FFFFFF', '#4CAF50'];
            for(let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.top = '50%'; p.style.left = '50%';
                
                const tx = (Math.random() - 0.5) * 600 + 'px';
                const ty = (Math.random() - 0.5) * 600 + 'px';
                p.style.setProperty('--tx', tx);
                p.style.setProperty('--ty', ty);
                p.style.animation = `explode 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }

        // == THE EPIC CHOMP & BURP ==
        function epicChomp() {
            const food = document.getElementById('food-reveal');
            const btn = document.getElementById('eat-btn');
            const title = document.getElementById('serve-title');
            const comic = document.getElementById('comic-chomp');

            // 1. Food violently shrinks
            food.classList.add('chomping'); 
            btn.style.display = 'none';
            title.style.opacity = '0';

            // 2. Comic text pops up
            setTimeout(() => { comic.classList.add('show'); }, 200);

            // 3. EPIC BURP & SCREEN SHAKE
            setTimeout(() => {
                comic.classList.remove('show');
                document.body.classList.add('shake-screen');
                title.style.opacity = '1';
                title.innerHTML = "BUUURRRRPPPPP!!! 💨<br><span style='font-size:1.2rem; color:#FFB800;'>Chef Abhijit is proud of you.</span>";
            }, 800);

            // 4. Total Reset
            setTimeout(() => {
                document.getElementById('serve-screen').classList.remove('active');
                
                setTimeout(() => {
                    cart = []; updateCartUI();
                    document.body.classList.remove('shake-screen');
                    document.getElementById('dome').classList.remove('lift');
                    document.getElementById('food-reveal').classList.remove('show', 'chomping');
                    btn.style.display = 'block';
                    btn.classList.remove('show');
                    title.innerHTML = "Waking up<br>Chef Abhijit... 😴";
                }, 600);
            }, 3500);
        }

        window.onload = () => { renderMenu(); updateCartUI(); }
    </script>
</body>
</html>
